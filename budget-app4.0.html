<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>轻记账</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23007aff'/><text x='50' y='68' font-size='48' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700'>¥</text></svg>">
<style>
:root{
  --fz:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  --fn:'SF Pro Display',-apple-system,'Helvetica Neue',sans-serif;
  --fs:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  --bg:#f2f2f7;
  --card:rgba(255,255,255,.82);
  --card-solid:#ffffff;
  --fill:rgba(118,118,128,.12);
  --fill2:rgba(118,118,128,.06);
  --lb:#000;--lb2:rgba(60,60,67,.6);--lb3:rgba(60,60,67,.3);
  --sep:rgba(60,60,67,.13);--sep2:rgba(60,60,67,.06);
  --blue:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;
  --purple:#af52de;--pink:#ff2d55;--teal:#5ac8fa;--indigo:#5856d6;
  --glass:rgba(255,255,255,.72);
  --glass-border:rgba(255,255,255,.45);
  --glass-shine:linear-gradient(135deg,rgba(255,255,255,.5) 0%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.3) 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{font-family:var(--fs);background:var(--bg);color:var(--lb);-webkit-font-smoothing:antialiased;min-height:100%;overflow-x:hidden;padding-top:env(safe-area-inset-top)}
#root{min-height:100vh}
.n{font-family:var(--fn);font-feature-settings:'tnum'}
.z{font-family:var(--fz)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield;font-family:var(--fn)}
input:focus{outline:none}
button{-webkit-appearance:none;font-family:var(--fs);cursor:pointer;border:none;background:none}
input[type=date]{font-family:var(--fs);color:var(--lb);min-height:36px}
::selection{background:var(--blue);color:#fff}
.trk{height:6px;border-radius:3px;background:var(--fill);overflow:hidden}
.trk>div{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.tap:active{opacity:.55;transition:opacity .08s}
.tap-s:active{transform:scale(.97);transition:transform .1s}
svg{display:block}

/* ═══ Liquid Glass ═══ */
.glass{
  background:var(--glass);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border:0.5px solid var(--glass-border);
  box-shadow:
    0 1px 3px rgba(0,0,0,.04),
    0 4px 12px rgba(0,0,0,.03),
    inset 0 1px 0 rgba(255,255,255,.6);
  position:relative;
  overflow:hidden;
}
.glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.35) 0%,rgba(255,255,255,0) 100%);
  pointer-events:none;border-radius:inherit;
}
.glass-subtle{
  background:rgba(255,255,255,.65);
  backdrop-filter:saturate(120%) blur(12px);
  -webkit-backdrop-filter:saturate(120%) blur(12px);
  border:0.5px solid rgba(255,255,255,.35);
  box-shadow:0 1px 3px rgba(0,0,0,.03),inset 0 0.5px 0 rgba(255,255,255,.5);
}

/* Category grid */
.cat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:4px;
}
.cat-grid.narrow{grid-template-columns:repeat(5,1fr);gap:6px}
.cat-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;border-radius:12px;
  transition:all .15s;font-family:var(--fz);
}
.cat-item.on{background:var(--fill)}

/* Stacked bar for savings viz */
.sbar{display:flex;height:10px;border-radius:5px;overflow:hidden;background:var(--fill)}
.sbar>div{height:100%;transition:width .4s ease}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo}=React;

/* ═══ CATEGORIES with SF-symbol-style SVG icons ═══ */
const CATS=[
  {id:"work_meal",name:"工作餐",color:"#ff9500",avg:"wd",pct:.14,subs:["早午餐+饮品","下午茶零食","咖啡","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h2v6a4 4 0 004 4h0a4 4 0 004-4V4h2v6a6 6 0 01-5 5.91V20h3v2H9v-2h3v-4.09A6 6 0 014 10V4z"/></svg>},
  {id:"eat_out",name:"外出就餐",color:"#ff6b35",avg:"all",pct:.10,subs:["餐厅","火锅烧烤","聚餐","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 2a1 1 0 012 0v7a3 3 0 01-2.82 3H11v10a1 1 0 01-2 0V12h-.18A3 3 0 016 9V2a1 1 0 012 0v5a1 1 0 002 0V2zm7 0a1 1 0 011 1v19a1 1 0 01-2 0V16h-2a3 3 0 01-3-3V5c0-1.66 2.69-3 5-3z"/></svg>},
  {id:"home_food",name:"在家吃",color:"#34c759",avg:"all",pct:.08,subs:["外卖到家","买菜食材","零食","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h16V9l-8-6zm0 2.5L18 10v9H6v-9l6-4.5zM9 14h6v2H9v-2z"/></svg>},
  {id:"family",name:"家庭用品",color:"#30d158",avg:"all",pct:.08,subs:["日用品","清洁用品","生活物品","收纳家居","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V4a2 2 0 00-2-2H7zm0 2h10v16H7V4zm2 3v2h6V7H9zm0 4v2h6v-2H9z"/></svg>},
  {id:"transport",name:"交通",color:"#007aff",avg:"wd",pct:.07,subs:["公交地铁","打车","加油停车","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8 2 5 3 5 6.5V16a3 3 0 002 2.83V21a1 1 0 001 1h1a1 1 0 001-1v-2h4v2a1 1 0 001 1h1a1 1 0 001-1v-2.17A3 3 0 0019 16V6.5C19 3 16 2 12 2zM7.5 17a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm9 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM17 11H7V6h10v5z"/></svg>},
  {id:"shopping",name:"购物",color:"#ff2d55",avg:"all",pct:.12,subs:["衣物鞋包","数码3C","美妆护肤","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2l-2 4v14a2 2 0 002 2h12a2 2 0 002-2V6l-2-4H6zm0 2h12l1 2H5l1-2zm3 6a3 3 0 006 0h2a5 5 0 01-10 0h2z"/></svg>},
  {id:"housing",name:"居住",color:"#5ac8fa",avg:"all",pct:.22,subs:["房租房贷","水电煤","物业","维修","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 2a2 2 0 012-2h0a2 2 0 012 2v2h3a2 2 0 012 2v16H5V6a2 2 0 012-2h3V2zM8 8v2h2V8H8zm4 0v2h2V8h-2zm-4 4v2h2v-2H8zm4 4v4h2v-4h-2zm4-4v2h2v-2h-2zm0-4v2h2V8h-2z"/></svg>},
  {id:"fun",name:"娱乐",color:"#af52de",avg:"all",pct:.06,subs:["电影演出","游戏","健身","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 6H3a1 1 0 00-1 1v10a1 1 0 001 1h18a1 1 0 001-1V7a1 1 0 00-1-1zM7 15a2 2 0 110-4 2 2 0 010 4zm4-3l2 2 2-2 2 2V9H9v3l2 2z"/></svg>},
  {id:"health",name:"医疗",color:"#5856d6",avg:"all",pct:.04,subs:["门诊","药品","体检保险","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-4 11h-2v2a1 1 0 01-2 0v-2H9a1 1 0 010-2h2v-2a1 1 0 012 0v2h2a1 1 0 010 2z"/></svg>},
  {id:"social",name:"人情",color:"#ff2d55",avg:"all",pct:.03,subs:["礼物红包","份子钱","请客","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>},
  {id:"other",name:"其他",color:"#8e8e93",avg:"all",pct:.03,subs:["宠物","订阅","其他"],
   icon:<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2.5"/><circle cx="12" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/></svg>},
];
const PAYS=[{id:"wechat",name:"微信"},{id:"alipay",name:"支付宝"},{id:"credit",name:"信用卡"},{id:"debit",name:"储蓄卡"},{id:"cash",name:"现金"}];
const SK="budget-v8";
const D=()=>({entries:[],cb:{},mb:0,sp:0,sg:0,sl:[],pj:[],ok:false});
const fm=n=>Math.abs(n).toLocaleString("zh-CN",{maximumFractionDigits:0});
const nw=()=>new Date();
const mo=d=>{const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}`};
const tm=()=>mo(nw());
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const td=()=>{const d=nw();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
const isoToDate=iso=>iso.slice(0,10);
const dateToIso=d=>new Date(d+"T12:00:00").toISOString();
const fD=s=>{if(!s)return"";const p=s.split("-");return`${+p[1]}/${+p[2]}`};
const fDF=s=>{if(!s)return"";const p=s.split("-");return`${+p[1]}月${+p[2]}日`};
const fM=s=>{if(!s)return"";const p=s.split("-");return`${+p[0]}年${+p[1]}月`};
function cWD(f,t){let c=0;const d=new Date(f),e=new Date(t);while(d<=e){const w=d.getDay();if(w>0&&w<6)c++;d.setDate(d.getDate()+1)}return c||1}
function cD(f,t){return Math.max(1,Math.round((new Date(t)-new Date(f))/864e5)+1)}
function wdE(){const y=nw().getFullYear(),m=nw().getMonth();return cWD(`${y}-${String(m+1).padStart(2,"0")}-01`,td())}
function dE(){return nw().getDate()}
function dM(){return new Date(nw().getFullYear(),nw().getMonth()+1,0).getDate()}
function prevMo(m){const[y,mm]=m.split("-").map(Number);const d=new Date(y,mm-2,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}
function nextMo(m){const[y,mm]=m.split("-").map(Number);const d=new Date(y,mm,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}

const gMeB=(ents,m=tm())=>ents.filter(e=>mo(e.df)===m&&!e.pid&&!e.fromSav);
const gMeAll=(ents,m=tm())=>ents.filter(e=>mo(e.df)===m&&!e.pid);
function lastRec(ents){const me=gMeAll(ents);if(!me.length)return null;let mx="";me.forEach(e=>{const d=e.dt||e.df;if(d>mx)mx=d});return mx}
const LS={g(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

const ICN={
  back:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>,
  chev:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>,
  list:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h6"/></svg>,
  gear:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>,
  refresh:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.5 9a9 9 0 0115-3.4L23 10M1 14l4.5 4.4A9 9 0 0020.5 15"/></svg>,
  calendar:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
  house:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10l9-7 9 7v10a2 2 0 01-2 2H5a2 2 0 01-2-2V10z"/><path d="M9 22V12h6v10"/></svg>,
  plus:<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>,
  star:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l2.9 6.4 7.1.8-5.3 4.9 1.5 7-6.2-3.6L5.8 21l1.5-7L2 9.2l7.1-.8z"/></svg>,
};

/* ═══ Category icon component — rounded square with SVG ═══ */
function CIcon({c,size=32}){
  const r=size*0.22;
  return<div style={{width:size,height:size,borderRadius:r,background:c.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
    <div style={{width:size*.55,height:size*.55}}>{c.icon}</div>
  </div>;
}

/* ═══ APP ═══ */
function App(){
  const[data,sd]=useState(null),[vw,sv]=useState("home"),[ag,sa]=useState(null),[ld,sl]=useState(true);
  useEffect(()=>{sd(LS.g(SK)||D());sl(false)},[]);
  const save=useCallback(d=>{sd(d);LS.s(SK,d)},[]);
  const go=(v,a)=>{sv(v);sa(a||null);window.scrollTo(0,0)};
  if(ld)return<div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh"}}><p className="z" style={{color:"var(--lb2)"}}>加载中…</p></div>;
  if(!data)return null;
  if(!data.ok)return<Setup onDone={d=>save({...D(),...d,ok:true})}/>;
  const P={
    home:<Home d={data} s={save} go={go}/>,add:<Add d={data} s={save} gb={()=>go("home")} pid={ag}/>,
    recon:<Recon d={data} s={save} go={go}/>,hist:<Hist d={data} s={save} go={go}/>,
    sett:<Sett d={data} s={save} gb={()=>go("home")}/>,sav:<Sav d={data} s={save} go={go}/>,
    savFlow:<SavFlow d={data} s={save} go={go}/>,savEdit:<SavEdit d={data} s={save} gb={()=>go("savFlow")} lid={ag}/>,
    pjd:<PjD d={data} s={save} go={go} pid={ag}/>,pjl:<PjL d={data} s={save} go={go}/>,
    pay:<PayB d={data} gb={()=>go("home")}/>,edit:<Edit d={data} s={save} gb={()=>go("hist")} eid={ag}/>,
    editFromSav:<Edit d={data} s={save} gb={()=>go("savFlow")} eid={ag}/>,
  };
  return<>{P[vw]||P.home}{["home","add","sav"].includes(vw)&&<TabBar c={vw} go={go}/>}</>;
}

function TabBar({c,go}){
  return<div className="glass" style={S.tabs}>{[["home","首页","house"],["add","记账","plus"],["sav","储蓄","star"]].map(([id,lb,ic])=>
    <button key={id} onClick={()=>go(id)} className="tap-s" style={{...S.tab,color:c===id?"var(--blue)":"var(--lb2)"}}>
      {ICN[ic]}<span className="z" style={{fontSize:10,fontWeight:500,marginTop:2}}>{lb}</span>
    </button>)}</div>;
}

/* ═══ CATEGORY GRID SELECTOR ═══ */
function CatGrid({cat,setCat,setSub,cols=4}){
  return<div className={`cat-grid${cols===5?" narrow":""}`}>
    {CATS.map(c=>{
      const on=cat===c.id;
      return<button key={c.id} className={`cat-item tap-s${on?" on":""}`} onClick={()=>{setCat(c.id);setSub&&setSub("")}}>
        <CIcon c={c} size={cols===5?28:34}/>
        <span className="z" style={{fontSize:cols===5?10:11,color:on?"var(--lb)":"var(--lb2)",fontWeight:on?600:400,lineHeight:1.2,textAlign:"center"}}>{c.name}</span>
      </button>;
    })}
  </div>;
}

/* ═══ SETUP ═══ */
function Setup({onDone}){
  const[st,ss]=useState(0),[b,sb]=useState(""),[sg,ssg]=useState(""),[sp,sSp]=useState(""),[cb,scb]=useState({});
  if(st===0)return<div style={S.setupBg}><div style={S.setupIn}>
    <div style={{width:72,height:72,borderRadius:18,background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",boxShadow:"0 8px 24px rgba(0,122,255,.25)"}}><span className="n" style={{color:"#fff",fontSize:44,fontWeight:700}}>¥</span></div>
    <h1 className="z" style={{fontSize:34,fontWeight:700,letterSpacing:.37,marginTop:20}}>轻记账</h1>
    <p className="z" style={{fontSize:15,color:"var(--lb2)",marginTop:6}}>专为攒几天记一次的你</p>
    <div style={{textAlign:"left",width:"100%",marginTop:36}}>
      <Label>每月总预算</Label>
      <input style={S.inp} type="number" inputMode="numeric" placeholder="例如 8000" value={b} onChange={e=>sb(e.target.value)}/>
      <Label mt>每月储蓄目标</Label>
      <input style={S.inp} type="number" inputMode="numeric" placeholder="可选" value={sg} onChange={e=>ssg(e.target.value)}/>
      <Label mt>现有储蓄余额</Label>
      <p className="z" style={{fontSize:12,color:"var(--lb2)",margin:"-2px 0 6px"}}>本月之前已有的储蓄</p>
      <input style={S.inp} type="number" inputMode="numeric" placeholder="可选" value={sp} onChange={e=>sSp(e.target.value)}/>
    </div>
    <button className="tap-s" style={{...S.btnP,marginTop:28}} onClick={()=>{if(+b<=0)return;const r={};CATS.forEach(c=>{r[c.id]=Math.round(+b*c.pct)});scb(r);ss(1)}}>继续</button>
  </div></div>;
  const tot=Object.values(cb).reduce((a,v)=>a+(+v||0),0);const df=+b-tot;
  return<div style={{background:"var(--bg)",minHeight:"100vh",padding:"56px 16px 40px"}}>
    <h2 className="z" style={{fontSize:28,fontWeight:700,textAlign:"center"}}>分类预算</h2>
    <p className="z n" style={{fontSize:15,textAlign:"center",marginTop:6,marginBottom:24,color:"var(--lb2)"}}>根据 ¥{fm(+b)} 智能推荐</p>
    <div className="glass" style={{...S.card,padding:"4px 16px"}}>{CATS.map((c,i)=>{const v=cb[c.id]||"";const p=+b>0&&+v>0?Math.round(+v/+b*100):0;
      return<div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<CATS.length-1?"0.5px solid var(--sep2)":"none"}}>
        <CIcon c={c} size={26}/>
        <span className="z" style={{flex:1,fontSize:15}}>{c.name}</span>
        <input style={{...S.inp,width:90,padding:"6px 10px",fontSize:15,textAlign:"right"}} type="number" inputMode="numeric" placeholder="不限" value={v} onChange={e=>scb({...cb,[c.id]:e.target.value})}/>
        <span className="n" style={{width:32,fontSize:12,color:"var(--lb3)",textAlign:"right"}}>{p}%</span>
      </div>})}</div>

/* ═══ SAVINGS — with improved visualization ═══ */
function Sav({d,s,go}){
  const[amt,sA]=useState(""),[note,sN]=useState(""),[showInit,sSI]=useState(false),[initVal,sIV]=useState("");

  const md=d.sl.filter(l=>mo(l.date)===tm()&&l.t==="d").reduce((a,l)=>a+l.a,0);
  const mw=d.sl.filter(l=>mo(l.date)===tm()&&l.t==="w").reduce((a,l)=>a+l.a,0);
  const mSpent=d.entries.filter(e=>mo(e.df)===tm()&&e.fromSav).reduce((a,e)=>a+e.amount,0);
  const mOut=mw+mSpent; // total outflow this month
  const netSav=md-mOut; // can be negative
  const overflow=Math.max(0,mOut-md); // how much came from historical
  const effMonthly=Math.max(0,netSav);
  const monthNet=md-mw-mSpent;
  const histBalance=d.sp-monthNet;

  const allDep=d.sl.filter(l=>l.t==="d").reduce((a,l)=>a+l.a,0);
  const allWit=d.sl.filter(l=>l.t==="w").reduce((a,l)=>a+l.a,0);
  const allSpent=d.entries.filter(e=>e.fromSav).reduce((a,e)=>a+e.amount,0);
  const histDep=allDep-md;const histWit=allWit-mw;const histSpent=allSpent-mSpent;

  const goalProgress=d.sg>0?Math.min(effMonthly/d.sg*100,100):0;
  const goalMet=d.sg>0&&effMonthly>=d.sg;

  const act=t=>{if(!amt||+amt<=0)return;if(t==="w"&&+amt>d.sp)return alert("余额不足");s({...d,sp:t==="d"?d.sp+ +amt:d.sp- +amt,sl:[...d.sl,{id:uid(),t,a:+amt,date:new Date().toISOString(),note}]});sA("");sN("")};
  const setInitial=()=>{if(initVal===""||+initVal<0)return;s({...d,sp:+initVal});sSI(false);sIV("")};

  // For stacked bar: deposits vs outflows
  const barMax=Math.max(md,mOut,1);
  const depW=md/barMax*100;
  const outW=mOut/barMax*100;

  return<div style={{paddingBottom:100,minHeight:"100vh"}}>
    <div style={{padding:"12px 16px 4px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
      <h1 className="z" style={{fontSize:34,fontWeight:700,letterSpacing:.37,lineHeight:1.1}}>储蓄</h1>
      <button className="tap-s" style={{color:"var(--blue)",padding:"6px 10px",fontSize:15,fontFamily:"var(--fz)"}} onClick={()=>go("savFlow")}>流水 ›</button>
    </div>

    {/* Total balance - glass hero */}
    <div className="glass" style={{...S.card,margin:"10px 16px 0",padding:"28px 20px 24px",textAlign:"center",background:"rgba(240,253,244,.6)",border:"0.5px solid rgba(52,199,89,.2)"}}>
      <p className="z" style={{fontSize:13,color:"var(--lb2)"}}>储蓄池总余额</p>
      <p className="n" style={{fontSize:48,fontWeight:700,lineHeight:1.05,letterSpacing:-1.5,margin:"6px 0"}}>
        <span style={{fontSize:24,fontWeight:500,color:"var(--lb2)"}}>¥</span>{fm(d.sp)}
      </p>
    </div>

    {/* Monthly goal + net savings visualization */}
    <GH>本月储蓄</GH>
    <div className="glass" style={{...S.card,margin:"0 16px",padding:"18px 16px"}}>
      {/* Net savings — big number, RED if negative */}
      <div style={{display:"flex",alignItems:"baseline",gap:6}}>
        <span className="z" style={{fontSize:13,color:"var(--lb2)",marginRight:4}}>本月净储蓄</span>
        <span className="n" style={{fontSize:32,fontWeight:700,color:netSav>=0?"var(--green)":"var(--red)"}}>{netSav>=0?"+":"-"}¥{fm(netSav)}</span>
      </div>

      {/* Stacked bar: green=deposits, red/orange=outflows */}
      <div style={{marginTop:12,marginBottom:6}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--lb2)",marginBottom:4}}>
          <span className="z n">存入 ¥{fm(md)}</span>
          <span className="z n">消耗 ¥{fm(mOut)}</span>
        </div>
        <div style={{display:"flex",gap:3,height:10,borderRadius:5,overflow:"hidden",background:"var(--fill)"}}>
          {md>0&&<div style={{width:`${depW}%`,background:"var(--green)",borderRadius:md>=mOut?"5px":"5px 0 0 5px",transition:"width .4s"}}/>}
          {mOut>0&&<div style={{width:`${outW}%`,background:mOut>md?"var(--red)":"var(--orange)",borderRadius:mOut>=md?"5px":"0 5px 5px 0",transition:"width .4s"}}/>}
        </div>
      </div>

      {overflow>0&&<p className="z n" style={{fontSize:12,color:"var(--red)",marginTop:6}}>消耗超出本月存入 ¥{fm(overflow)}，从历史余额扣除</p>}

      {/* Goal progress if set */}
      {d.sg>0&&<div style={{marginTop:16,paddingTop:14,borderTop:"0.5px solid var(--sep2)"}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between"}}>
          <span className="z" style={{fontSize:13,color:"var(--lb2)"}}>月度目标</span>
          <div style={{display:"flex",alignItems:"baseline",gap:4}}>
            <span className="n" style={{fontSize:20,fontWeight:700,color:goalMet?"var(--green)":"var(--lb)"}}>¥{fm(effMonthly)}</span>
            <span className="n" style={{fontSize:13,color:"var(--lb3)"}}>/ ¥{fm(d.sg)}</span>
            {goalMet&&<span className="z" style={{fontSize:10,fontWeight:600,color:"var(--green)",background:"rgba(52,199,89,.15)",padding:"2px 8px",borderRadius:980,marginLeft:4}}>已达成</span>}
          </div>
        </div>
        <div className="trk" style={{height:6,marginTop:8}}><div style={{background:goalMet?"var(--green)":"var(--blue)",width:`${goalProgress}%`}}/></div>
      </div>}
    </div>

    {/* Breakdown */}
    <GH>本月明细</GH>
    <div className="glass" style={{...S.card,margin:"0 16px",padding:0,overflow:"hidden"}}>
      {[["本月存入",md,"var(--green)","+"],["本月取出",mw,"var(--orange)","-"],["本月消费扣除",mSpent,"var(--red)","-"]].map(([l,v,c,sign],i)=>
        <div key={l} style={{padding:"14px 16px",borderBottom:i<2?"0.5px solid var(--sep2)":"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span className="z" style={{fontSize:15}}>{l}</span>
          <span className="n" style={{fontSize:16,fontWeight:600,color:c}}>{sign}¥{fm(v)}</span>
        </div>)}
    </div>

    {/* Deposit/withdraw */}
    <GH>存入 / 取出</GH>
    <div className="glass" style={{...S.card,margin:"0 16px",padding:16}}>
      <input className="n" style={{...S.inp,marginBottom:8}} type="number" inputMode="decimal" placeholder="金额" value={amt} onChange={e=>sA(e.target.value)}/>
      <input style={{...S.inp,marginBottom:12}} placeholder="备注（可选）" value={note} onChange={e=>sN(e.target.value)}/>
      <div style={{display:"flex",gap:8}}>
        <button className="tap-s" style={S.btnP} onClick={()=>act("d")}>存入</button>
        <button className="tap-s" style={{...S.btnS,color:"var(--red)"}} onClick={()=>act("w")}>取出</button>
      </div>
    </div>

    {/* Historical */}
    <GH>历史（本月之前）</GH>
    <div className="glass" style={{...S.card,margin:"0 16px",padding:0,overflow:"hidden"}}>
      <div style={{padding:"14px 16px",borderBottom:"0.5px solid var(--sep2)",display:"flex",justifyContent:"space-between"}}>
        <span className="z" style={{fontSize:15,fontWeight:600}}>历史余额</span>
        <span className="n" style={{fontSize:17,fontWeight:700}}>¥{fm(histBalance)}</span>
      </div>
      {[["累计存入",histDep,"var(--green)","+"],["累计取出",histWit,"var(--orange)","-"],["累计消费扣除",histSpent,"var(--red)","-"]].map(([l,v,c,sign],i)=>
        <div key={l} style={{padding:"14px 16px",borderBottom:i<2?"0.5px solid var(--sep2)":"none",display:"flex",justifyContent:"space-between"}}>
          <span className="z" style={{fontSize:14,color:"var(--lb2)"}}>{l}</span>
          <span className="n" style={{fontSize:15,fontWeight:500,color:c}}>{sign}¥{fm(v)}</span>
        </div>)}
    </div>

    <div style={{margin:"14px 16px 0"}}>
      {!showInit?<button className="tap-s" style={S.btnS} onClick={()=>{sIV(String(d.sp));sSI(true)}}>调整历史余额</button>
      :<div className="glass" style={{...S.card,padding:16}}>
        <Label>设置储蓄池余额</Label>
        <input className="n" style={{...S.inp,marginBottom:10}} type="number" inputMode="numeric" value={initVal} onChange={e=>sIV(e.target.value)}/>
        <div style={{display:"flex",gap:8}}>
          <button className="tap-s" style={S.btnS} onClick={()=>sSI(false)}>取消</button>
          <button className="tap-s" style={S.btnP} onClick={setInitial}>保存</button>
        </div>
      </div>}
    </div>
  </div>;
}

/* ═══ SAVINGS FLOW ═══ */
function SavFlow({d,s,go}){
  const[month,setMonth]=useState(tm());
  const flow=useMemo(()=>{
    const items=[];
    d.sl.forEach(l=>{if(mo(l.date)!==month)return;items.push({kind:"sl",id:l.id,date:isoToDate(l.date),rawDate:l.date,type:l.t,amount:l.a,note:l.note||""})});
    d.entries.filter(e=>e.fromSav&&mo(e.df)===month).forEach(e=>{items.push({kind:"entry",id:e.id,date:e.df,rawDate:e.df,type:"c",amount:e.amount,note:e.note||"",cat:e.cat,sub:e.sub})});
    return items.sort((a,b)=>(b.rawDate>a.rawDate?1:-1));
  },[d.sl,d.entries,month]);
  const depSum=flow.filter(f=>f.type==="d").reduce((a,f)=>a+f.amount,0);
  const witSum=flow.filter(f=>f.type==="w").reduce((a,f)=>a+f.amount,0);
  const conSum=flow.filter(f=>f.type==="c").reduce((a,f)=>a+f.amount,0);
  const netChange=depSum-witSum-conSum;
  const typeColor={d:"var(--green)",w:"var(--orange)",c:"var(--red)"};
  const typeSign={d:"+",w:"-",c:"-"};

  return<Page><NavB t="储蓄流水" ob={()=>go("sav")}/>
    <div style={{padding:"0 16px 40px"}}>
      <MonthNav month={month} setMonth={setMonth}/>
      <div className="glass" style={{...S.card,padding:0,overflow:"hidden",marginBottom:16}}>
        {[["存入",depSum,"var(--green)","+"],["取出",witSum,"var(--orange)","-"],["消费扣除",conSum,"var(--red)","-"]].map(([l,v,c,sign],i)=>
          <div key={l} style={{padding:"14px 16px",borderBottom:i<2?"0.5px solid var(--sep2)":"none",display:"flex",justifyContent:"space-between"}}>
            <span className="z" style={{fontSize:14,color:"var(--lb2)"}}>{l}</span>
            <span className="n" style={{fontSize:15,fontWeight:600,color:c}}>{sign}¥{fm(v)}</span>
          </div>)}
        <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",background:"var(--fill2)"}}>
          <span className="z" style={{fontSize:15,fontWeight:600}}>净变化</span>
          <span className="n" style={{fontSize:16,fontWeight:700,color:netChange>=0?"var(--green)":"var(--red)"}}>{netChange>=0?"+":"-"}¥{fm(netChange)}</span>
        </div>
      </div>
      {flow.length===0&&<p className="z" style={{textAlign:"center",padding:"32px 0",color:"var(--lb2)"}}>该月没有流水</p>}
      {flow.length>0&&<>
        <GH>明细</GH>
        <div className="glass" style={{...S.card,padding:0,overflow:"hidden"}}>
          {flow.map((f,i)=>{
            const cat=f.kind==="entry"?(CATS.find(c=>c.id===f.cat)||CATS[10]):null;
            return<div key={f.kind+f.id} className="tap" style={{display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:i<flow.length-1?"0.5px solid var(--sep2)":"none",gap:12,cursor:"pointer"}} onClick={()=>go(f.kind==="sl"?"savEdit":"editFromSav",f.id)}>
              {cat?<CIcon c={cat} size={30}/>:
                <div style={{width:30,height:30,borderRadius:8,background:typeColor[f.type],color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,fontFamily:"var(--fz)",flexShrink:0}}>{f.type==="d"?"存":"取"}</div>}
              <div style={{flex:1,minWidth:0}}>
                <p className="z" style={{fontSize:15,fontWeight:500}}>{cat?`${cat.name}${f.sub&&f.sub!=="其他"?" · "+f.sub:""}`:f.type==="d"?"存入":"取出"}</p>
                <p className="z n" style={{fontSize:12,color:"var(--lb2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{fDF(f.date)}{f.kind==="entry"?" · 消费扣除":""}{f.note?" · "+f.note:""}</p>
              </div>
              <span className="n" style={{fontSize:16,fontWeight:600,color:typeColor[f.type]}}>{typeSign[f.type]}¥{fm(f.amount)}</span>
              <span style={{color:"var(--lb3)"}}>{ICN.chev}</span>
            </div>;
          })}
        </div>
      </>}
    </div>
  </Page>;
}

    </div>

      <p className="z" style={{fontSize:13,color:"var(--lb2)"}}>已花费</p>
      <p className="n" style={{fontSize:36,fontWeight:700,margin:"8px 0"}}><span style={{fontSize:18,color:"var(--lb2)"}}>¥</span>{fm(spent)}{pj.budget>0&&<span style={{fontSize:15,color:"var(--lb3)",fontWeight:400}}> / {fm(pj.budget)}</span>}</p>
      {pj.budget>0&&<div className="trk" style={{height:6,marginTop:8}}><div style={{background:spent>pj.budget?"var(--red)":"var(--green)",width:`${Math.min(spent/pj.budget*100,100)}%`}}/></div>}
      {fromSavS>0&&<p className="z n" style={{fontSize:12,color:"var(--lb2)",marginTop:10}}>月预算 ¥{fm(spent-fromSavS)} · 储蓄池 ¥{fm(fromSavS)}</p>}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      <button className="tap-s" style={S.btnP} onClick={()=>go("add",pid)}>记一笔</button>
      {!pj.closed&&<button className="tap-s" style={S.btnS} onClick={()=>s({...d,pj:d.pj.map(p=>p.id===pid?{...p,closed:true}:p)})}>结束</button>}
    </div>
    <div className="glass" style={{...S.card,padding:0,overflow:"hidden"}}>
      {ents.map((e,i)=>{const c=CATS.find(x=>x.id===e.cat)||CATS[10];return<div key={e.id} className="tap" style={{display:"flex",alignItems:"center",padding:"12px 14px",borderBottom:i<ents.length-1?"0.5px solid var(--sep2)":"none",gap:12,cursor:"pointer"}} onClick={()=>go("edit",e.id)}>
        <CIcon c={c} size={28}/>
        <div style={{flex:1}}>
          <p className="z" style={{fontSize:15,fontWeight:500}}>{c.name}{e.fromSav?" · 储蓄扣":""}</p>
          <p className="z" style={{fontSize:12,color:"var(--lb2)"}}>{fD(e.df)}{e.dt&&e.dt!==e.df?"→"+fD(e.dt):""}{e.note?" · "+e.note:""}</p>
        </div>
        <span className="n" style={{fontSize:15,fontWeight:600}}>¥{fm(e.amount)}</span>
      </div>})}
      {!ents.length&&<p className="z" style={{textAlign:"center",padding:"24px 0",color:"var(--lb2)"}}>还没有记录</p>}
    </div>
  </div></Page>;
}

function PayB({d,gb}){
  const me=gMeAll(d.entries);const byP={};PAYS.forEach(p=>(byP[p.id]=0));me.forEach(e=>(byP[e.pay]=(byP[e.pay]||0)+e.amount));const tot=me.reduce((a,e)=>a+e.amount,0);
  return<Page><NavB t="支付方式" ob={gb}/><div style={{padding:"0 16px"}}>
    <div className="glass" style={{...S.card,padding:"4px 16px",marginTop:8}}>
      {PAYS.map((p,i)=>{const a=byP[p.id]||0;if(!a)return null;return<div key={p.id} style={{padding:"12px 0",borderBottom:i<PAYS.length-1?"0.5px solid var(--sep2)":"none"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span className="z" style={{fontSize:15}}>{p.name}</span>
          <span className="n" style={{fontSize:15,fontWeight:600}}>¥{fm(a)} <span style={{fontWeight:400,color:"var(--lb3)",fontSize:13}}>· {tot>0?Math.round(a/tot*100):0}%</span></span>
        </div>
        <div className="trk" style={{height:4}}><div style={{background:"var(--blue)",width:`${tot>0?a/tot*100:0}%`}}/></div>
      </div>})}
      {tot===0&&<p className="z" style={{textAlign:"center",padding:"24px 0",color:"var(--lb2)"}}>本月还没有记录</p>}
    </div>
  </div></Page>;
}

function Sett({d,s,gb}){
  const[b,sB]=useState(String(d.mb)),[sg,sSG]=useState(String(d.sg)),[cb,sCB]=useState({...d.cb});
  const af=()=>{if(+b<=0)return;const r={};CATS.forEach(c=>{r[c.id]=Math.round(+b*c.pct)});sCB(r)};
  const tot=Object.values(cb).reduce((a,v)=>a+(+v||0),0);const df=+b-tot;
  return<Page><NavB t="设置" ob={gb}/><div style={{padding:"0 16px 60px"}}>
    <GH>预算与目标</GH>
    <div className="glass" style={{...S.card,padding:0,overflow:"hidden"}}>
      <div style={{padding:"12px 16px",borderBottom:"0.5px solid var(--sep2)",display:"flex",alignItems:"center"}}>
        <span className="z" style={{fontSize:15,flex:1}}>每月总预算</span>
        <input className="n" style={{...S.inpMin,width:120,textAlign:"right"}} type="number" inputMode="numeric" value={b} onChange={e=>sB(e.target.value)}/>
      </div>
      <div style={{padding:"12px 16px",display:"flex",alignItems:"center"}}>
        <span className="z" style={{fontSize:15,flex:1}}>每月储蓄目标</span>
        <input className="n" style={{...S.inpMin,width:120,textAlign:"right"}} type="number" inputMode="numeric" value={sg} onChange={e=>sSG(e.target.value)}/>
      </div>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",margin:"22px 4px 6px"}}>
      <p className="z" style={{fontSize:13,color:"var(--lb2)"}}>分类预算</p>
      <button className="tap-s" style={{fontSize:14,color:"var(--blue)",fontFamily:"var(--fz)"}} onClick={af}>智能推荐</button>
    </div>
    <div className="glass" style={{...S.card,padding:"4px 16px"}}>
      {CATS.map((c,i)=>{const v=cb[c.id]||"";const p=+b>0&&+v>0?Math.round(+v/+b*100):0;return<div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<CATS.length-1?"0.5px solid var(--sep2)":"none"}}>
        <CIcon c={c} size={24}/>
        <span className="z" style={{flex:1,fontSize:14}}>{c.name}</span>
        <input className="n" style={{...S.inpMin,width:80,textAlign:"right",fontSize:14}} type="number" inputMode="numeric" placeholder="不限" value={v} onChange={e=>sCB({...cb,[c.id]:e.target.value})}/>
        <span className="n" style={{width:32,fontSize:12,color:"var(--lb3)",textAlign:"right"}}>{p}%</span>
      </div>})}
    </div>
    <p className="n" style={{textAlign:"center",fontSize:13,fontWeight:600,color:df>=0?"var(--green)":"var(--red)",margin:"10px 0"}}>已分配 ¥{fm(tot)} / ¥{fm(+b||0)}{df>0?` · 余¥${fm(df)}`:df<0?` · 超¥${fm(-df)}`:" ✓"}</p>
    <button className="tap-s" style={{...S.btnP,marginTop:10}} onClick={()=>{const r={};Object.entries(cb).forEach(([k,v])=>{if(+v>0)r[k]=+v});s({...d,mb:+b||d.mb,sg:+sg||0,cb:r});gb()}}>保存</button>
    <GH>数据</GH>
    <div className="glass" style={{...S.card,padding:0,overflow:"hidden"}}>
      <button className="tap" style={{width:"100%",padding:"14px 16px",textAlign:"left",borderBottom:"0.5px solid var(--sep2)"}} onClick={()=>{const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`budget-${td()}.json`;a.click()}}>
        <span className="z" style={{fontSize:15,color:"var(--blue)"}}>导出备份</span>
      </button>
      <label className="tap" style={{display:"block",padding:"14px 16px",borderBottom:"0.5px solid var(--sep2)",cursor:"pointer"}}>
        <span className="z" style={{fontSize:15,color:"var(--blue)"}}>导入备份</span>
        <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const x=JSON.parse(ev.target.result);if(x.entries!==undefined){if(confirm("覆盖当前数据？")){s(x);gb()}}else alert("格式错误")}catch{alert("解析失败")}};r.readAsText(f)}}/>
      </label>
      <button className="tap" style={{width:"100%",padding:"14px 16px",textAlign:"left"}} onClick={()=>{if(confirm("清空所有数据？")){s(D());gb()}}}>
        <span className="z" style={{fontSize:15,color:"var(--red)"}}>清空所有数据</span>
      </button>
    </div>
  </div></Page>;
}

/* ═══ SHARED ═══ */
function Page({children}){return<div style={{minHeight:"100vh",background:"var(--bg)"}}>{children}</div>}
function NavB({t,ob}){return<div className="glass" style={{display:"flex",alignItems:"center",padding:"10px 8px 8px",position:"sticky",top:0,zIndex:10,borderRadius:0,borderTop:"none",borderLeft:"none",borderRight:"none"}}>
  <button onClick={ob} className="tap-s" style={{display:"flex",alignItems:"center",gap:2,color:"var(--blue)",fontSize:17,padding:"6px 10px"}}>{ICN.back}<span className="z">返回</span></button>
  <span className="z" style={{flex:1,textAlign:"center",fontSize:17,fontWeight:600,letterSpacing:-.41,marginRight:70}}>{t}</span>
</div>}
function Pill({children,on,cl,ck}){return<button onClick={ck} className="tap-s" style={{padding:"7px 14px",fontSize:14,borderRadius:980,background:on?cl:"var(--fill)",color:on?"#fff":"var(--lb)",transition:"all .15s",fontFamily:"var(--fz)",fontWeight:on?500:400,whiteSpace:"nowrap"}}>{children}</button>}
function Toggle({on,ck,label,hint}){return<div style={{padding:"10px 0"}}>
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
    <span className="z" style={{fontSize:15}}>{label}</span>
    <button onClick={ck} style={{width:51,height:31,borderRadius:16,background:on?"var(--green)":"rgba(120,120,128,.16)",position:"relative",transition:"background .25s",padding:0}}>
      <div style={{width:27,height:27,borderRadius:14,background:"#fff",position:"absolute",top:2,left:on?22:2,transition:"left .25s cubic-bezier(.4,0,.2,1)",boxShadow:"0 3px 8px rgba(0,0,0,.15),0 1px 2px rgba(0,0,0,.08)"}}/>
    </button>
  </div>
  {hint&&<p className="z" style={{fontSize:12,color:on?"var(--green)":"var(--lb2)",marginTop:4}}>{hint}</p>}
</div>}

const S={
  setupBg:{minHeight:"100vh",background:"var(--bg)",display:"flex",justifyContent:"center",alignItems:"center"},
  setupIn:{padding:"0 32px",textAlign:"center",width:"100%",maxWidth:380},
  card:{background:"var(--card)",borderRadius:14,margin:"0 16px"},
  inp:{display:"block",width:"100%",padding:"11px 14px",fontSize:17,border:"none",borderRadius:10,background:"var(--fill)",boxSizing:"border-box",fontFamily:"var(--fs)",letterSpacing:-.41,color:"var(--lb)"},
  inpMin:{padding:"6px 10px",fontSize:15,border:"none",borderRadius:8,background:"var(--fill)",fontFamily:"var(--fn)",color:"var(--lb)"},
  btnP:{width:"100%",padding:"14px",fontSize:17,fontWeight:500,borderRadius:14,background:"var(--blue)",color:"#fff",fontFamily:"var(--fz)",letterSpacing:-.41},
  btnS:{width:"100%",padding:"14px",fontSize:17,fontWeight:400,borderRadius:14,background:"var(--fill)",color:"var(--lb)",fontFamily:"var(--fz)",letterSpacing:-.41},
  cg:{display:"flex",flexWrap:"wrap",gap:6},
  navIco:{padding:8,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8},
  tabs:{position:"fixed",bottom:0,left:0,right:0,display:"flex",justifyContent:"center",padding:"4px 0 calc(env(safe-area-inset-bottom, 8px) + 4px)",borderTop:"none",borderRadius:0,zIndex:50,borderLeft:"none",borderRight:"none"},
  tab:{display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"4px 32px",minWidth:72},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
